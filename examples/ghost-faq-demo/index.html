<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GhostNet Support</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f0f0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .widget {
      width: 420px;
      height: 680px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 12px 60px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────── */
    .widget-header {
      background: #1a1a2e;
      padding: 28px 24px 24px;
      position: relative;
    }

    .widget-header .logo {
      width: 56px;
      height: 56px;
      margin-bottom: 18px;
    }

    .widget-header .close-btn {
      position: absolute;
      top: 18px;
      right: 18px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.5);
      font-size: 22px;
      cursor: pointer;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      transition: background 0.15s;
    }

    .widget-header .close-btn:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }

    .widget-header h1 {
      color: #fff;
      font-size: 22px;
      font-weight: 700;
      line-height: 1.3;
    }

    /* ── Body ────────────────────────────────── */
    .widget-body {
      flex: 1;
      overflow-y: auto;
      padding: 0;
      background: #fff;
    }

    /* ── Conversation area ───────────────────── */
    .section-label {
      font-size: 12px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 20px 24px 8px;
    }

    .conversation-list {
      padding: 0 16px;
    }

    .conversation-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 12px;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .conversation-item:hover {
      background: #f5f5f7;
    }

    .conversation-item .avatar-group {
      position: relative;
      width: 44px;
      height: 44px;
      flex-shrink: 0;
    }

    .conversation-item .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #6c5ce7;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      position: absolute;
    }

    .conversation-item .avatar:first-child {
      top: 0;
      left: 0;
      background: #1a1a2e;
    }

    .conversation-item .avatar:last-child {
      bottom: 0;
      right: 0;
      background: #6c5ce7;
      border: 2px solid #fff;
    }

    .conversation-item .conv-text {
      flex: 1;
      min-width: 0;
    }

    .conversation-item .conv-title {
      font-size: 14px;
      font-weight: 600;
      color: #1a1a2e;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .conversation-item .conv-preview {
      font-size: 13px;
      color: #888;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .conversation-item .conv-time {
      font-size: 12px;
      color: #aaa;
      flex-shrink: 0;
    }

    /* ── Search bar ──────────────────────────── */
    .search-section {
      padding: 12px 16px;
    }

    .search-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f5f5f7;
      border-radius: 12px;
      padding: 14px 16px;
      cursor: text;
      border: 1.5px solid transparent;
      transition: border-color 0.15s, background 0.15s;
    }

    .search-bar:focus-within {
      border-color: #6c5ce7;
      background: #fff;
    }

    .search-bar input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-family: inherit;
      font-size: 15px;
      color: #1a1a2e;
    }

    .search-bar input::placeholder {
      color: #aaa;
    }

    .search-bar .search-icon {
      color: #6c5ce7;
      font-size: 18px;
      flex-shrink: 0;
    }

    .search-bar button {
      background: #6c5ce7;
      border: none;
      color: #fff;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .search-bar button:hover {
      background: #5a4bd1;
    }

    /* ── Help link cards ─────────────────────── */
    .help-links {
      padding: 0 16px 12px;
    }

    .help-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-radius: 12px;
      background: #f5f5f7;
      margin-bottom: 8px;
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none;
      color: #1a1a2e;
    }

    .help-link:hover {
      background: #ededf0;
    }

    .help-link span {
      font-size: 14px;
      font-weight: 500;
    }

    .help-link .arrow {
      color: #6c5ce7;
      font-size: 18px;
    }

    /* ── Chat messages overlay ───────────────── */
    .chat-view {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }

    .chat-view.active {
      display: flex;
    }

    .home-view.hidden {
      display: none;
    }

    .chat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid #eee;
    }

    .chat-header .back-btn {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: #1a1a2e;
      padding: 4px;
      border-radius: 6px;
      transition: background 0.15s;
    }

    .chat-header .back-btn:hover {
      background: #f0f0f2;
    }

    .chat-header h3 {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a2e;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .chat-msg {
      max-width: 82%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.55;
      word-wrap: break-word;
    }

    .chat-msg.user {
      align-self: flex-end;
      background: #6c5ce7;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .chat-msg.bot {
      align-self: flex-start;
      background: #f5f5f7;
      color: #1a1a2e;
      border-bottom-left-radius: 4px;
    }

    .chat-msg.bot.error {
      background: #fff0f0;
      color: #c0392b;
    }

    .chat-msg .typing {
      display: inline-flex;
      gap: 4px;
      padding: 4px 0;
    }

    .chat-msg .typing span {
      width: 6px;
      height: 6px;
      background: #aaa;
      border-radius: 50%;
      animation: blink 1.4s infinite both;
    }

    .chat-msg .typing span:nth-child(2) { animation-delay: 0.2s; }
    .chat-msg .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.3; }
      40% { opacity: 1; }
    }

    .chat-input-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-top: 1px solid #eee;
      background: #fff;
    }

    .chat-input-bar input {
      flex: 1;
      border: 1.5px solid #e0e0e0;
      border-radius: 24px;
      padding: 11px 18px;
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    .chat-input-bar input:focus {
      border-color: #6c5ce7;
    }

    .chat-input-bar button {
      background: #6c5ce7;
      border: none;
      color: #fff;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .chat-input-bar button:hover {
      background: #5a4bd1;
    }

    /* ── Bottom nav ──────────────────────────── */
    .bottom-nav {
      display: flex;
      border-top: 1px solid #eee;
      background: #fff;
      border-radius: 0 0 20px 20px;
    }

    .bottom-nav button {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 12px 0;
      border: none;
      background: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      font-weight: 500;
      color: #888;
      transition: color 0.15s;
      position: relative;
    }

    .bottom-nav button.active {
      color: #6c5ce7;
    }

    .bottom-nav button .nav-icon {
      font-size: 20px;
    }

    .bottom-nav button .badge {
      position: absolute;
      top: 6px;
      right: calc(50% - 18px);
      background: #e74c3c;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Scrollbar ───────────────────────────── */
    .widget-body::-webkit-scrollbar,
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .widget-body::-webkit-scrollbar-thumb,
    .chat-messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
  </style>
</head>
<body>

<div class="widget">
  <!-- Header -->
  <div class="widget-header">
    <img class="logo" src="/logo.png" alt="N11X Collective" />
    <button class="close-btn">&times;</button>
    <h1>Need support?<br>How can we help?</h1>
  </div>

  <!-- Home View -->
  <div class="widget-body home-view" id="homeView">
    <!-- Search -->
    <div class="search-section">
      <form class="search-bar" id="searchForm">
        <input type="text" id="searchInput" placeholder="Ask about GhostNet..." />
        <button type="submit">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
      </form>
    </div>
  </div>

  <!-- Chat View -->
  <div class="chat-view" id="chatView">
    <div class="chat-header">
      <button class="back-btn" id="backBtn">&larr;</button>
      <h3>GhostNet Support</h3>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <form class="chat-input-bar" id="chatForm">
      <input type="text" id="chatInput" placeholder="Type a message..." autofocus />
      <button type="submit">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </form>
  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <button class="active" id="navHome">
      <span class="nav-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      </span>
      Home
    </button>
    <button id="navMessages">
      <span class="nav-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
      </span>
      <span class="badge">1</span>
      Messages
    </button>
    <button id="navHelp">
      <span class="nav-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/></svg>
      </span>
      Help
    </button>
  </div>
</div>

<script type="module">
  import { GhostSupportBot } from '../dist/index.js';

  const bot = new GhostSupportBot();
  const homeView = document.getElementById('homeView');
  const chatView = document.getElementById('chatView');
  const chatMessages = document.getElementById('chatMessages');
  const chatInput = document.getElementById('chatInput');
  const chatForm = document.getElementById('chatForm');
  const searchForm = document.getElementById('searchForm');
  const searchInput = document.getElementById('searchInput');
  const backBtn = document.getElementById('backBtn');
  const navHome = document.getElementById('navHome');
  const navMessages = document.getElementById('navMessages');

  function showChat(initialQuery) {
    homeView.classList.add('hidden');
    chatView.classList.add('active');
    navHome.classList.remove('active');
    navMessages.classList.add('active');
    if (initialQuery) {
      setTimeout(() => sendMessage(initialQuery), 300);
    }
    chatInput.focus();
  }

  function showHome() {
    chatView.classList.remove('active');
    homeView.classList.remove('hidden');
    navMessages.classList.remove('active');
    navHome.classList.add('active');
  }

  function addMsg(text, type) {
    const div = document.createElement('div');
    div.className = 'chat-msg ' + type;
    if (type === 'bot' && text.includes('having trouble')) div.classList.add('error');
    div.textContent = text;
    chatMessages.appendChild(div);
    chatMessages.scrollTop = chatMessages.scrollHeight;
    return div;
  }

  let nextTurnId = 0;

  async function sendMessage(text) {
    if (!text.trim()) return;
    const userInput = text.trim();
    chatInput.value = '';

    // Bind this turn's reply to its own placeholder bubble so answers
    // always render under their own question, even with requests in flight.
    const turnId = nextTurnId++;
    addMsg(userInput, 'user').dataset.turnId = turnId;
    const placeholder = addMsg('', 'bot');
    placeholder.dataset.turnId = turnId;
    placeholder.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';

    const response = await bot.ask(userInput);
    placeholder.innerHTML = '';
    placeholder.textContent = response;
    if (response.includes('having trouble')) placeholder.classList.add('error');
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  // Event listeners
  backBtn.addEventListener('click', showHome);
  navHome.addEventListener('click', showHome);
  navMessages.addEventListener('click', () => showChat());
  document.getElementById('navHelp').addEventListener('click', () => showChat());

  chatForm.addEventListener('submit', (e) => {
    e.preventDefault();
    sendMessage(chatInput.value);
  });

  searchForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const q = searchInput.value.trim();
    if (q) {
      searchInput.value = '';
      showChat(q);
    }
  });
</script>

</body>
</html>
